# rustfmt config for the flvproxy project. max_width is set far above any real line length so rustfmt does NOT hand-wrap code or prose — newlines carry semantic meaning only (see AGENTS.md → "Comments and line wrapping"): a newline must mark a sentence/paragraph/thought boundary, a struct field group, or a distinct code phase, never merely keep a line short. Editors soft-wrap; if a line is genuinely too long, fix the code or the sentence, do not rely on the formatter to chop it. Re-evaluate only if a reviewer finds that unwrapped lines are hurting readability in practice.
max_width = 10000
